<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>UFL Community Liga — Tabelle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06090f;
      --surface:   #0c1220;
      --surface2:  #121d30;
      --border:    #1a2840;
      --apex:      #f97316;
      --apex-dim:  rgba(249,115,22,.15);
      --nova:      #a78bfa;
      --nova-dim:  rgba(167,139,250,.15);
      --gold:      #facc15;
      --text:      #e2e8f0;
      --muted:     #4a6080;
      --success:   #22c55e;
      --danger:    #ef4444;
    }

    html, body { min-height: 100vh; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(249,115,22,.05) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 80%, rgba(167,139,250,.05) 0%, transparent 50%);
    }

    /* ── HEADER ── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(6,9,15,.9);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .site-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 5px;
      color: white;
    }
    .site-logo span { color: var(--gold); }

    .season-badge {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .header-actions { display: flex; align-items: center; gap: 12px; }

    .btn-comm {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
    }
    .btn-comm:hover { border-color: var(--gold); color: var(--gold); }
    .btn-comm.active { background: var(--gold); color: #000; border-color: var(--gold); }

    /* ── MAIN LAYOUT ── */
    .page { max-width: 1400px; margin: 0 auto; padding: 32px 24px; }

    .leagues-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    /* ── LIGA CARD ── */
    .liga-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .liga-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .liga-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .liga-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .liga-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
    }

    .liga-head {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    /* Apex theme */
    .liga-card.apex .liga-dot   { background: var(--apex); box-shadow: 0 0 8px var(--apex); }
    .liga-card.apex .liga-name  { color: var(--apex); }
    .liga-card.apex .liga-head  { color: var(--apex); border-color: rgba(249,115,22,.3); background: var(--apex-dim); }

    /* Nova theme */
    .liga-card.nova .liga-dot   { background: var(--nova); box-shadow: 0 0 8px var(--nova); }
    .liga-card.nova .liga-name  { color: var(--nova); }
    .liga-card.nova .liga-head  { color: var(--nova); border-color: rgba(167,139,250,.3); background: var(--nova-dim); }

    /* ── STANDINGS TABLE ── */
    .standings { width: 100%; border-collapse: collapse; }

    .standings thead tr {
      background: var(--surface2);
    }
    .standings th {
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .standings th.num { text-align: center; }

    .standings td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid rgba(26,40,64,.5);
    }
    .standings td.num {
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .standings tr:last-child td { border-bottom: none; }

    .standings tr:hover td { background: rgba(255,255,255,.02); }

    /* Rank column */
    .rank-cell {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .rank-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      color: var(--muted);
      width: 20px;
      flex-shrink: 0;
    }
    .rank-num.top1 { color: var(--gold); }
    .rank-num.top2 { color: #94a3b8; }
    .rank-num.top3 { color: #cd7c2f; }

    .team-name-cell { font-weight: 700; font-size: 14px; }

    /* Points highlighted */
    td.pts {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      text-align: center;
    }
    .liga-card.apex td.pts { color: var(--apex); }
    .liga-card.nova td.pts { color: var(--nova); }

    /* Form pills */
    .form-cell { display: flex; gap: 3px; align-items: center; }
    .form-pill {
      width: 18px; height: 18px;
      border-radius: 4px;
      font-size: 9px;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
    }
    .form-W { background: rgba(34,197,94,.2); color: #22c55e; }
    .form-D { background: rgba(250,204,21,.2); color: #facc15; }
    .form-L { background: rgba(239,68,68,.2); color: #ef4444; }

    /* TD diff color */
    .positive { color: var(--success); }
    .negative { color: var(--danger); }

    /* ── SPIELTAGE SECTION ── */
    .spieltage-section { margin-top: 40px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 4px;
      color: var(--text);
    }

    .spieltag-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .spieltag-tab {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 1px;
      font-family: 'Syne', sans-serif;
    }
    .spieltag-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }

    .spieltage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .spieltag-liga {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .spieltag-liga-header {
      padding: 12px 18px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 3px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .apex .spieltag-liga-header { color: var(--apex); }
    .nova .spieltag-liga-header { color: var(--nova); }

    .match-row {
      display: flex;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid rgba(26,40,64,.4);
      gap: 10px;
      transition: background .15s;
    }
    .match-row:hover { background: rgba(255,255,255,.02); }
    .match-row:last-child { border-bottom: none; }

    .match-home { flex: 1; text-align: right; font-weight: 600; font-size: 13px; }
    .match-away { flex: 1; text-align: left;  font-weight: 600; font-size: 13px; }

    .match-score {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: white;
      width: 70px;
      text-align: center;
      flex-shrink: 0;
    }
    .match-score.pending {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 1px;
      font-family: 'Syne', sans-serif;
    }

    /* ── COMMISSIONER PANEL ── */
    .comm-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-top: 32px;
      display: none;
    }
    .comm-panel.visible { display: block; }

    .comm-panel h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      margin-bottom: 24px;
      color: var(--gold);
    }

    .comm-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
    }

    .comm-tab {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .comm-tab.active.apex { background: var(--apex-dim); border-color: var(--apex); color: var(--apex); }
    .comm-tab.active.nova { background: var(--nova-dim); border-color: var(--nova); color: var(--nova); }

    .comm-section { display: none; }
    .comm-section.visible { display: block; }

    .comm-section h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .team-manager { margin-bottom: 28px; }

    .team-row-edit {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }
    .team-row-edit input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .team-row-edit input:focus { border-color: var(--gold); }

    .result-entry {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
    }

    .result-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .result-row select, .result-row input[type="number"] {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    .result-row select:focus, .result-row input[type="number"]:focus { border-color: var(--gold); }
    .result-row input[type="number"] { width: 60px; text-align: center; }
    .result-row .vs { color: var(--muted); font-weight: 700; font-size: 12px; text-align: center; }
    .result-row select { width: 100%; }

    .spieltag-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .spieltag-selector label {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
    }
    .spieltag-selector select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 6px 12px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
    }

    .btn-save {
      padding: 10px 24px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-save:hover { background: #f59e0b; }

    .btn-danger-sm {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-danger-sm:hover { background: rgba(239,68,68,.1); }

    .btn-add {
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-add:hover { border-color: var(--gold); color: var(--gold); }

    /* Login modal */
    .login-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(6px);
      z-index: 500;
      align-items: center;
      justify-content: center;
    }
    .login-modal.active { display: flex; }
    .login-box-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 360px;
      animation: fadeUp .3s ease;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .login-box-modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 3px;
      color: var(--gold);
      margin-bottom: 20px;
    }
    .login-box-modal input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 14px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .login-box-modal input:focus { border-color: var(--gold); }
    .login-error { color: var(--danger); font-size: 12px; margin-bottom: 8px; }

    .actions-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }

    /* Responsive */
    @media (max-width: 900px) {
      .leagues-grid, .spieltage-grid { grid-template-columns: 1fr; }
      .site-header { padding: 16px; flex-wrap: wrap; gap: 10px; }
      .page { padding: 20px 14px; }
      .result-row { grid-template-columns: 1fr 40px 1fr auto; }
      .result-row .vs { display: none; }
    }
    @media (max-width: 500px) {
      .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
      .spieltag-tabs { gap: 4px; }
      .standings th, .standings td { padding: 8px 8px; font-size: 12px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header class="site-header">
    <div class="site-logo">UFL<span>LIGA</span></div>
    <div class="season-badge">Season 1 · 2025</div>
    <div class="header-actions">
      <button class="btn-comm" id="commBtn" onclick="openCommLogin()">⚙️ Commissioner</button>
    </div>
  </header>

  <!-- ── MAIN ── -->
  <div class="page">

    <!-- TABELLEN -->
    <div class="leagues-grid">

      <!-- APEX -->
      <div class="liga-card apex">
        <div class="liga-header">
          <div class="liga-title">
            <div class="liga-dot"></div>
            <div class="liga-name">APEX</div>
          </div>
          <div class="liga-head">Ligenkopf: Seb</div>
        </div>
        <table class="standings">
          <thead>
            <tr>
              <th>#</th>
              <th>Team</th>
              <th class="num">Sp</th>
              <th class="num">S</th>
              <th class="num">U</th>
              <th class="num">N</th>
              <th class="num">T</th>
              <th class="num">TD</th>
              <th class="num">Pkt</th>
              <th>Form</th>
            </tr>
          </thead>
          <tbody id="apexTable"></tbody>
        </table>
      </div>

      <!-- NOVA -->
      <div class="liga-card nova">
        <div class="liga-header">
          <div class="liga-title">
            <div class="liga-dot"></div>
            <div class="liga-name">NOVA</div>
          </div>
          <div class="liga-head">Ligenkopf: AGE_Kevin</div>
        </div>
        <table class="standings">
          <thead>
            <tr>
              <th>#</th>
              <th>Team</th>
              <th class="num">Sp</th>
              <th class="num">S</th>
              <th class="num">U</th>
              <th class="num">N</th>
              <th class="num">T</th>
              <th class="num">TD</th>
              <th class="num">Pkt</th>
              <th>Form</th>
            </tr>
          </thead>
          <tbody id="novaTable"></tbody>
        </table>
      </div>
    </div>

    <!-- SPIELTAGE -->
    <div class="spieltage-section">
      <div class="section-header">
        <div class="section-title">SPIELTAGE</div>
      </div>
      <div class="spieltag-tabs" id="spieltagTabs"></div>
      <div class="spieltage-grid" id="spieltagContent">
        <div class="spieltag-liga apex">
          <div class="spieltag-liga-header">
            <div class="liga-dot" style="width:8px;height:8px;border-radius:50%;background:var(--apex);flex-shrink:0;"></div>
            APEX
          </div>
          <div id="apexMatches"></div>
        </div>
        <div class="spieltag-liga nova">
          <div class="spieltag-liga-header">
            <div class="liga-dot" style="width:8px;height:8px;border-radius:50%;background:var(--nova);flex-shrink:0;"></div>
            NOVA
          </div>
          <div id="novaMatches"></div>
        </div>
      </div>
    </div>

    <!-- COMMISSIONER PANEL -->
    <div class="comm-panel" id="commPanel">
      <h2>⚙️ COMMISSIONER PANEL</h2>

      <div class="comm-tabs">
        <button class="comm-tab active apex" onclick="switchCommTab('apex')">🟠 Liga Apex</button>
        <button class="comm-tab nova" onclick="switchCommTab('nova')">🟣 Liga Nova</button>
      </div>

      <!-- APEX SECTION -->
      <div class="comm-section visible" id="commApex">
        <div class="team-manager">
          <h3>Teams verwalten — Apex</h3>
          <div id="apexTeamInputs"></div>
          <div class="actions-row">
            <button class="btn-save" onclick="saveTeams('apex')">💾 Teams speichern</button>
            <button class="btn-danger-sm" onclick="resetLiga('apex')">🗑️ Apex zurücksetzen</button>
          </div>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:20px 0"/>
        <h3>Ergebnis eintragen — Apex</h3>
        <div class="spieltag-selector">
          <label>Spieltag</label>
          <select id="apexSpieltag"></select>
        </div>
        <div id="apexResultInputs"></div>
        <div class="actions-row">
          <button class="btn-save" onclick="saveResults('apex')">💾 Ergebnisse speichern</button>
          <button class="btn-add" onclick="addSpieltag('apex')">+ Spieltag hinzufügen</button>
        </div>
      </div>

      <!-- NOVA SECTION -->
      <div class="comm-section" id="commNova">
        <div class="team-manager">
          <h3>Teams verwalten — Nova</h3>
          <div id="novaTeamInputs"></div>
          <div class="actions-row">
            <button class="btn-save" onclick="saveTeams('nova')">💾 Teams speichern</button>
            <button class="btn-danger-sm" onclick="resetLiga('nova')">🗑️ Nova zurücksetzen</button>
          </div>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:20px 0"/>
        <h3>Ergebnis eintragen — Nova</h3>
        <div class="spieltag-selector">
          <label>Spieltag</label>
          <select id="novaSpieltag"></select>
        </div>
        <div id="novaResultInputs"></div>
        <div class="actions-row">
          <button class="btn-save" onclick="saveResults('nova')">💾 Ergebnisse speichern</button>
          <button class="btn-add" onclick="addSpieltag('nova')">+ Spieltag hinzufügen</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOGIN MODAL -->
  <div class="login-modal" id="loginModal">
    <div class="login-box-modal">
      <h2>COMMISSIONER LOGIN</h2>
      <input type="password" id="commPwInput" placeholder="Passwort..." onkeydown="if(event.key==='Enter') doCommLogin()"/>
      <div class="login-error" id="loginErr"></div>
      <div class="actions-row">
        <button class="btn-save" onclick="doCommLogin()">Einloggen</button>
        <button class="btn-add" onclick="closeCommLogin()">Abbrechen</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue, set, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import { firebaseConfig } from "./firebase-config.js";

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    // ── CONFIG ──
    const COMM_PASSWORD = "admin1234"; // Change this!
    const DEFAULT_TEAMS = {
      apex: ["Team 1", "Team 2", "Team 3", "Team 4", "Team 5", "Team 6"],
      nova: ["Team 7", "Team 8", "Team 9", "Team 10", "Team 11", "Team 12"]
    };
    const NUM_SPIELTAGE = 5;

    let isCommissioner = false;
    let activeCommTab  = "apex";
    let activeSpielTag = 1;
    let ligaData = { apex: null, nova: null };

    // ── EXPOSE TO WINDOW ──
    window.openCommLogin  = openCommLogin;
    window.closeCommLogin = closeCommLogin;
    window.doCommLogin    = doCommLogin;
    window.switchCommTab  = switchCommTab;
    window.saveTeams      = saveTeams;
    window.saveResults    = saveResults;
    window.resetLiga      = resetLiga;
    window.addSpieltag    = addSpieltag;
    window.setSpielTag    = setSpielTag;

    // ── LOGIN ──
    function openCommLogin() {
      if (isCommissioner) {
        isCommissioner = false;
        document.getElementById("commPanel").classList.remove("visible");
        document.getElementById("commBtn").classList.remove("active");
        document.getElementById("commBtn").textContent = "⚙️ Commissioner";
        return;
      }
      document.getElementById("loginModal").classList.add("active");
      setTimeout(() => document.getElementById("commPwInput").focus(), 100);
    }

    function closeCommLogin() {
      document.getElementById("loginModal").classList.remove("active");
      document.getElementById("loginErr").textContent = "";
      document.getElementById("commPwInput").value = "";
    }

    function doCommLogin() {
      const pw = document.getElementById("commPwInput").value;
      if (pw !== COMM_PASSWORD) {
        document.getElementById("loginErr").textContent = "Falsches Passwort.";
        return;
      }
      isCommissioner = true;
      closeCommLogin();
      document.getElementById("commPanel").classList.add("visible");
      document.getElementById("commBtn").classList.add("active");
      document.getElementById("commBtn").textContent = "⚙️ Abmelden";
      loadCommPanel();
    }

    function switchCommTab(liga) {
      activeCommTab = liga;
      document.querySelectorAll(".comm-tab").forEach(t => t.classList.remove("active"));
      document.querySelectorAll(".comm-section").forEach(s => s.classList.remove("visible"));
      event.target.classList.add("active");
      document.getElementById("comm" + liga.charAt(0).toUpperCase() + liga.slice(1)).classList.add("visible");
    }

    // ── FIREBASE SUBSCRIPTIONS ──
    onValue(ref(db, "liga/apex"), snap => {
      ligaData.apex = snap.val() || getDefaultLiga("apex");
      renderTable("apex");
      renderSpieltagTabs();
      renderMatches();
      if (isCommissioner) loadCommPanel();
    });

    onValue(ref(db, "liga/nova"), snap => {
      ligaData.nova = snap.val() || getDefaultLiga("nova");
      renderTable("nova");
      renderMatches();
      if (isCommissioner) loadCommPanel();
    });

    function getDefaultLiga(liga) {
      const teams = DEFAULT_TEAMS[liga].map(name => ({ name, sp: 0, s: 0, u: 0, n: 0, tore: 0, gegentore: 0, form: [] }));
      const spieltage = {};
      for (let i = 1; i <= NUM_SPIELTAGE; i++) {
        spieltage[i] = { matches: generateMatchday(DEFAULT_TEAMS[liga], i) };
      }
      return { teams, spieltage };
    }

    function generateMatchday(teamNames, day) {
      // Round-robin: pair teams for each matchday
      const n = teamNames.length;
      const matches = [];
      for (let i = 0; i < n / 2; i++) {
        matches.push({ home: teamNames[i], away: teamNames[n - 1 - i], homeScore: null, awayScore: null });
      }
      return matches;
    }

    // ── RENDER TABLE ──
    function renderTable(liga) {
      const data  = ligaData[liga];
      if (!data || !data.teams) return;
      const tbody = document.getElementById(liga + "Table");
      if (!tbody) return;

      // Recalculate from results
      const teams = recalcStandings(liga);

      tbody.innerHTML = "";
      teams.forEach((team, idx) => {
        const rank   = idx + 1;
        const td_val = team.tore - team.gegentore;
        const tdStr  = td_val > 0 ? "+" + td_val : String(td_val);
        const tdClass = td_val > 0 ? "positive" : td_val < 0 ? "negative" : "";
        const rankClass = rank === 1 ? "top1" : rank === 2 ? "top2" : rank === 3 ? "top3" : "";

        const formHtml = (team.form || []).slice(-5).map(r => {
          const cls = r === "W" ? "form-W" : r === "D" ? "form-D" : "form-L";
          return `<div class="form-pill ${cls}">${r}</div>`;
        }).join("");

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <div class="rank-cell">
              <span class="rank-num ${rankClass}">${rank}</span>
            </div>
          </td>
          <td class="team-name-cell">${team.name}</td>
          <td class="num">${team.sp}</td>
          <td class="num">${team.s}</td>
          <td class="num">${team.u}</td>
          <td class="num">${team.n}</td>
          <td class="num">${team.tore}:${team.gegentore}</td>
          <td class="num ${tdClass}">${tdStr}</td>
          <td class="pts">${team.pkt}</td>
          <td><div class="form-cell">${formHtml}</div></td>
        `;
        tbody.appendChild(tr);
      });
    }

    function recalcStandings(liga) {
      const data = ligaData[liga];
      if (!data) return [];

      // Init team stats
      const stats = {};
      (data.teams || []).forEach(t => {
        stats[t.name] = { name: t.name, sp: 0, s: 0, u: 0, n: 0, tore: 0, gegentore: 0, pkt: 0, form: [] };
      });

      // Process all spieltage
      const spieltage = data.spieltage || {};
      Object.values(spieltage).forEach(st => {
        (st.matches || []).forEach(m => {
          if (m.homeScore === null || m.awayScore === null || m.homeScore === undefined) return;
          const h = stats[m.home];
          const a = stats[m.away];
          if (!h || !a) return;
          h.sp++; a.sp++;
          h.tore += m.homeScore; h.gegentore += m.awayScore;
          a.tore += m.awayScore; a.gegentore += m.homeScore;
          if (m.homeScore > m.awayScore) {
            h.s++; h.pkt += 3; h.form.push("W");
            a.n++;             a.form.push("L");
          } else if (m.homeScore < m.awayScore) {
            a.s++; a.pkt += 3; a.form.push("W");
            h.n++;              h.form.push("L");
          } else {
            h.u++; h.pkt++; h.form.push("D");
            a.u++; a.pkt++; a.form.push("D");
          }
        });
      });

      return Object.values(stats).sort((a, b) => {
        if (b.pkt !== a.pkt) return b.pkt - a.pkt;
        const tdA = a.tore - a.gegentore;
        const tdB = b.tore - b.gegentore;
        if (tdB !== tdA) return tdB - tdA;
        return b.tore - a.tore;
      });
    }

    // ── RENDER SPIELTAG TABS ──
    function renderSpieltagTabs() {
      const data = ligaData.apex || ligaData.nova;
      if (!data) return;
      const num  = Object.keys(data.spieltage || {}).length || NUM_SPIELTAGE;
      const tabs = document.getElementById("spieltagTabs");
      tabs.innerHTML = "";
      for (let i = 1; i <= num; i++) {
        const tab = document.createElement("button");
        tab.className = "spieltag-tab" + (i === activeSpielTag ? " active" : "");
        tab.textContent = "Spieltag " + i;
        tab.onclick = (function(day) { return function() { setSpielTag(day); }; })(i);
        tabs.appendChild(tab);
      }
    }

    function setSpielTag(day) {
      activeSpielTag = day;
      document.querySelectorAll(".spieltag-tab").forEach((t, i) => {
        t.classList.toggle("active", i + 1 === day);
      });
      renderMatches();
    }

    // ── RENDER MATCHES ──
    function renderMatches() {
      ["apex", "nova"].forEach(liga => {
        const el   = document.getElementById(liga + "Matches");
        const data = ligaData[liga];
        if (!el || !data) return;
        const st = (data.spieltage || {})[activeSpielTag];
        if (!st || !st.matches || st.matches.length === 0) {
          el.innerHTML = "<div style='padding:16px;color:var(--muted);font-size:13px;'>Keine Spiele eingetragen</div>";
          return;
        }
        el.innerHTML = st.matches.map(m => {
          const played   = m.homeScore !== null && m.homeScore !== undefined && m.awayScore !== null && m.awayScore !== undefined;
          const scoreHtml = played
            ? `<div class="match-score">${m.homeScore} : ${m.awayScore}</div>`
            : `<div class="match-score pending">vs</div>`;
          return `
            <div class="match-row">
              <div class="match-home">${m.home}</div>
              ${scoreHtml}
              <div class="match-away">${m.away}</div>
            </div>
          `;
        }).join("");
      });
    }

    // ── COMMISSIONER: LOAD PANEL ──
    function loadCommPanel() {
      ["apex", "nova"].forEach(liga => {
        const data  = ligaData[liga] || getDefaultLiga(liga);
        const teams = (data.teams || DEFAULT_TEAMS[liga].map(n => ({ name: n }))).map(t => t.name);

        // Team inputs
        const inp = document.getElementById(liga + "TeamInputs");
        inp.innerHTML = "";
        teams.forEach((name, i) => {
          const row = document.createElement("div");
          row.className = "team-row-edit";
          const input = document.createElement("input");
          input.type = "text";
          input.value = name;
          input.placeholder = "Team " + (i + 1);
          input.id = liga + "Team" + i;
          row.appendChild(input);
          inp.appendChild(row);
        });

        // Spieltag selector
        const stSel = document.getElementById(liga + "Spieltag");
        const numSt = Object.keys(data.spieltage || {}).length || NUM_SPIELTAGE;
        stSel.innerHTML = "";
        for (let i = 1; i <= numSt; i++) {
          const opt = document.createElement("option");
          opt.value = i; opt.textContent = "Spieltag " + i;
          if (i === activeSpielTag) opt.selected = true;
          stSel.appendChild(opt);
        }
        stSel.onchange = function() { loadResultInputs(liga); };

        loadResultInputs(liga);
      });
    }

    function loadResultInputs(liga) {
      const data    = ligaData[liga] || getDefaultLiga(liga);
      const day     = parseInt(document.getElementById(liga + "Spieltag").value) || 1;
      const st      = (data.spieltage || {})[day] || { matches: [] };
      const matches = st.matches || [];
      const el      = document.getElementById(liga + "ResultInputs");
      el.innerHTML  = "";

      const teams = (data.teams || DEFAULT_TEAMS[liga].map(n => ({ name: n }))).map(t => t.name);

      matches.forEach((m, idx) => {
        const div = document.createElement("div");
        div.className = "result-entry";

        const homeOpts = teams.map(t => `<option value="${t}" ${t === m.home ? "selected" : ""}>${t}</option>`).join("");
        const awayOpts = teams.map(t => `<option value="${t}" ${t === m.away ? "selected" : ""}>${t}</option>`).join("");
        const hScore   = m.homeScore !== null && m.homeScore !== undefined ? m.homeScore : "";
        const aScore   = m.awayScore !== null && m.awayScore !== undefined ? m.awayScore : "";

        div.innerHTML = `
          <div class="result-row">
            <select id="${liga}_home_${idx}">${homeOpts}</select>
            <input type="number" id="${liga}_hscore_${idx}" value="${hScore}" min="0" max="99" placeholder="0"/>
            <div class="vs">:</div>
            <input type="number" id="${liga}_ascore_${idx}" value="${aScore}" min="0" max="99" placeholder="0"/>
            <select id="${liga}_away_${idx}">${awayOpts}</select>
            <button class="btn-danger-sm" onclick="removeMatch('${liga}', ${idx})">✕</button>
          </div>
        `;
        el.appendChild(div);
      });

      // Add new match button
      const addBtn = document.createElement("button");
      addBtn.className = "btn-add";
      addBtn.textContent = "+ Spiel hinzufügen";
      addBtn.style.marginTop = "8px";
      addBtn.onclick = function() { addMatch(liga); };
      el.appendChild(addBtn);
    }

    window.removeMatch = function(liga, idx) {
      const data = ligaData[liga];
      const day  = parseInt(document.getElementById(liga + "Spieltag").value) || 1;
      if (!data || !data.spieltage || !data.spieltage[day]) return;
      data.spieltage[day].matches.splice(idx, 1);
      loadResultInputs(liga);
    };

    function addMatch(liga) {
      const data  = ligaData[liga] || getDefaultLiga(liga);
      const day   = parseInt(document.getElementById(liga + "Spieltag").value) || 1;
      const teams = (data.teams || DEFAULT_TEAMS[liga].map(n => ({ name: n }))).map(t => t.name);
      if (!data.spieltage) data.spieltage = {};
      if (!data.spieltage[day]) data.spieltage[day] = { matches: [] };
      data.spieltage[day].matches.push({ home: teams[0], away: teams[1], homeScore: null, awayScore: null });
      loadResultInputs(liga);
    }

    function addSpieltag(liga) {
      const data = ligaData[liga] || getDefaultLiga(liga);
      if (!data.spieltage) data.spieltage = {};
      const num  = Object.keys(data.spieltage).length + 1;
      const teams = (data.teams || DEFAULT_TEAMS[liga].map(n => ({ name: n }))).map(t => t.name);
      data.spieltage[num] = { matches: generateMatchday(teams, num) };
      set(ref(db, "liga/" + liga), data).then(() => {
        loadCommPanel();
      });
    }

    async function saveTeams(liga) {
      const data  = ligaData[liga] || getDefaultLiga(liga);
      const inputs = document.querySelectorAll("#" + liga + "TeamInputs input");
      const teams  = [];
      inputs.forEach(inp => {
        if (inp.value.trim()) teams.push({ name: inp.value.trim() });
      });
      data.teams = teams;
      await set(ref(db, "liga/" + liga), data);
      alert("Teams gespeichert!");
    }

    async function saveResults(liga) {
      const data = ligaData[liga] || getDefaultLiga(liga);
      const day  = parseInt(document.getElementById(liga + "Spieltag").value) || 1;
      const el   = document.getElementById(liga + "ResultInputs");
      const matchDivs = el.querySelectorAll(".result-entry");

      if (!data.spieltage) data.spieltage = {};
      if (!data.spieltage[day]) data.spieltage[day] = { matches: [] };

      const matches = [];
      matchDivs.forEach((_, idx) => {
        const home   = document.getElementById(liga + "_home_"   + idx)?.value;
        const away   = document.getElementById(liga + "_away_"   + idx)?.value;
        const hScore = document.getElementById(liga + "_hscore_" + idx)?.value;
        const aScore = document.getElementById(liga + "_ascore_" + idx)?.value;
        if (home && away) {
          matches.push({
            home,
            away,
            homeScore: hScore !== "" ? parseInt(hScore) : null,
            awayScore: aScore !== "" ? parseInt(aScore) : null
          });
        }
      });

      data.spieltage[day].matches = matches;
      await set(ref(db, "liga/" + liga), data);
      alert("Ergebnisse gespeichert!");
    }

    async function resetLiga(liga) {
      if (!confirm("Liga " + liga.toUpperCase() + " wirklich zurücksetzen?")) return;
      await set(ref(db, "liga/" + liga), getDefaultLiga(liga));
      alert("Zurückgesetzt.");
    }
  </script>
</body>
</html>
